<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Respiratory Disease Prediction</h1>

    <form action="/predict" method="POST">

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Fever</label>
        <select name="fever">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Cough</label>
        <select name="cough">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Shortness of Breath</label>
        <select name="shortness">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Chest Pain</label>
        <select name="chest_pain">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Fatigue</label>
        <select name="fatigue">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Wheezing</label>
        <select name="wheezing">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Smoking</label>
        <select name="smoking">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>SpO₂ Level</label>
        <input type="number" name="spo2" required>

        <button type="submit">Predict Disease</button>

    </form>
</div>

</body>
</html>
